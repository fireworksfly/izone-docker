services:
  redis:
    restart: always
    image: ${REDIS_IMAGE}
    container_name: izone_redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - ./redis/data:/data
    networks:
      - backend

  postgres:
    restart: always
    image: ${POSTGRES_IMAGE}
    container_name: izone_postgres
    command: ["postgres", "-c", "max_connections=${POSTGRES_MAX_CONNECTIONS:-30}"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db/data:/var/lib/postgresql/data
    networks:
      - backend

  web:
    restart: always
    image: ${IZONE_IMAGE}
    container_name: izone_web
    env_file:
      - ./izone.env
    volumes:
      - ./web/static:/opt/cloud/izone/static
      - ./web/media:/opt/cloud/izone/media
      - ./web/whoosh_index:/opt/cloud/izone/whoosh_index
      - ./web/log:/opt/cloud/izone/log
    links:
      - redis
    depends_on:
      - redis
      - postgres
    networks:
      - backend
      - frontend

  nginx:
    restart: always
    image: ${NGINX_IMAGE}
    container_name: izone_nginx
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./web/static:/usr/share/nginx/izone/static
      - ./web/media:/usr/share/nginx/izone/media
      # 新增SSL证书挂载（请确保宿主机有对应目录和文件）
      - ./nginx/ssl:/etc/nginx/ssl:ro  # 挂载证书目录到容器内
    ports:
      - "${NGINX_PORT}:80"
      - "443:443"
    links:
      - web
    networks:
      - frontend

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
