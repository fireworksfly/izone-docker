# HTTP端口重定向到HTTPS
server {
    listen      80;
    server_name blog.newromantics.top;

    return 301 https://$host$request_uri;
}

# HTTPS核心配置（适配pem/key格式）
server {
    listen      443 ssl;
    server_name blog.newromantics.top;

    # 新增：设置上传文件最大大小为100M（解决413错误）
    client_max_body_size 5M;

    # 关键修改：适配pem/key格式的证书路径
    ssl_certificate     /etc/nginx/ssl/www.blog.newromantics.top.pem;  # pem格式公钥
    ssl_certificate_key /etc/nginx/ssl/www.blog.newromantics.top.key;  # key格式私钥

    # 保留SSL优化配置（可选但推荐）
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 10m;
    ssl_session_cache   shared:SSL:10m;

    # 原有业务逻辑完全保留
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-User-Agent $http_user_agent;
    }

    location /static/ {
        root /usr/share/nginx/izone;
    }

    location /media/ {
        root /usr/share/nginx/izone;
    }
}
